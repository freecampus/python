        - lessons/capstone/presentation-and-rubric.qmd
  page-footer:
    left: "FreeCampus Python — learn by building, explaining, and debugging."
    right:
      - text: GitHub
        href: https://github.com/freecampus/python

format:
  html:
    theme:
      light: [cosmo, theme-light.scss]
      dark: [darkly, theme-dark.scss]
    css: styles.css
    toc: true
    toc-title: On this page
    toc-depth: 3
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    code-line-numbers: true
    link-external-newwindow: true

execute:
  freeze: auto
  eval: false

            - lessons/advanced-python-patterns/comprehensions.qmd
            - lessons/advanced-python-patterns/iterables-and-generators.qmd
            - lessons/advanced-python-patterns/decorators.qmd
            - lessons/advanced-python-patterns/context-managers.qmd
            - lessons/advanced-python-patterns/logging-and-configuration.qmd

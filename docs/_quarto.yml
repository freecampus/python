            - lessons/scientific-python/matplotlib-basics.qmd
            - lessons/scientific-python/sympy-symbolic-math.qmd
            - lessons/scientific-python/scipy-overview.qmd
        - section: Data Science
          contents:
            - lessons/data-science/index.qmd
            - lessons/data-science/workflow-and-loading.qmd
            - lessons/data-science/inspecting-selecting-cleaning.qmd
            - lessons/data-science/grouping-and-statistics.qmd

project:
  type: website
  output-dir: _site

website:
  title: FreeCampus Python
  description: A beginner-first Python course from zero programming experience to practical projects.
  site-url: https://freecampus-org.github.io/python/
  repo-url: https://github.com/freecampus-org/python
  repo-actions: [edit, issue]
  page-navigation: true
  bread-crumbs: true
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: lessons/index.qmd
        text: Lessons
      - href: lessons/debugging/error-messages.qmd
        text: Debugging
    right:
      - icon: github
        href: https://github.com/freecampus-org/python
        aria-label: GitHub repository
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - section: Course
        contents:
          - lessons/index.qmd
          - lessons/learner-profiles.qmd
          - lessons/instructor-notes.qmd
      - section: Getting Started
        contents:
          - lessons/getting-started/index.qmd
          - lessons/getting-started/what-is-programming.qmd
          - lessons/getting-started/google-colab.qmd
          - lessons/getting-started/local-python-tools.qmd
      - section: Core Python
        contents:
          - lessons/core-python/index.qmd
          - lessons/core-python/values-variables-types.qmd
          - lessons/core-python/strings-input-output.qmd
          - lessons/core-python/booleans-and-conditionals.qmd
          - lessons/core-python/loops-and-tracing.qmd
      - section: Data Structures
        contents:
          - lessons/data-structures/index.qmd
          - lessons/data-structures/lists.qmd
          - lessons/data-structures/tuples.qmd
          - lessons/data-structures/dictionaries.qmd
          - lessons/data-structures/sets.qmd
          - lessons/data-structures/nested-data.qmd
      - section: Functions
        contents:
          - lessons/functions/index.qmd
          - lessons/functions/function-basics.qmd
          - lessons/functions/function-contracts.qmd
          - lessons/functions/decomposition-and-testing.qmd
      - section: Debugging
        contents:
          - lessons/debugging/index.qmd
          - lessons/debugging/error-messages.qmd
          - lessons/debugging/debugging-tools.qmd
          - lessons/debugging/minimal-reproducible-examples.qmd
      - section: Files and Data
        contents:
          - lessons/files-and-data/index.qmd
          - lessons/files-and-data/paths-and-text-files.qmd
          - lessons/files-and-data/structured-files.qmd
          - lessons/files-and-data/exceptions-and-validation.qmd
      - section: Projects and Environments
        contents:
          - lessons/projects-and-environments/index.qmd
          - lessons/projects-and-environments/modules-and-packages.qmd
          - lessons/projects-and-environments/environments-and-dependencies.qmd
          - lessons/projects-and-environments/command-line-programs.qmd
          - lessons/projects-and-environments/project-layout.qmd
      - section: Code Quality
        contents:
          - lessons/code-quality/index.qmd
          - lessons/code-quality/testing-with-pytest.qmd
          - lessons/code-quality/style-formatting-and-linting.qmd
          - lessons/code-quality/type-checking.qmd
          - lessons/code-quality/pre-commit-and-ci.qmd
      - section: Object-Oriented Python
        contents:
          - lessons/object-oriented-python/index.qmd
          - lessons/object-oriented-python/oop-basics.qmd
          - lessons/object-oriented-python/dataclasses.qmd
          - lessons/object-oriented-python/oop-design.qmd
      - section: Advanced Python Patterns
        contents:
          - lessons/advanced-python-patterns/index.qmd
          - lessons/advanced-python-patterns/comprehensions.qmd
          - lessons/advanced-python-patterns/iterables-and-generators.qmd
          - lessons/advanced-python-patterns/decorators.qmd
          - lessons/advanced-python-patterns/context-managers.qmd
          - lessons/advanced-python-patterns/logging-and-configuration.qmd
      - section: Scientific Python

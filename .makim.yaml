groups:
  all:
    tasks:
      ci:
        help: Run lint, tests, package build, and docs build
        hooks:
          pre-run:
            - task: tests.linter
            - task: tests.unit
            - task: package.build
            - task: docs.build

  clean:
    tasks:
      tmp:
        help: Clean unnecessary temporary files
        backend: bash
        run: |
          rm -fr build/
          rm -fr dist/
          rm -fr .eggs/
          rm -f .coverage
          rm -fr htmlcov/
          rm -fr .pytest_cache
          rm -fr .mypy_cache
          rm -fr .ruff_cache
          rm -fr .quarto-tmp
          rm -fr .cache
          find . -name '*.egg-info' -exec rm -fr {} +
          find . -name '*.egg' -exec rm -f {} +
          find . -name '*.pyc' -exec rm -f {} +
          find . -name '__pycache__' -exec rm -fr {} +
          find . -name '*.pyo' -exec rm -f {} +
          find . -name '*~' -exec rm -f {} +

  docs:
    tasks:
      build:
        help: Build the Quarto documentation website
        backend: bash
        run: |
          mkdir -p .quarto-tmp .cache/deno .cache/quarto-home
          HOME="$PWD/.cache/quarto-home" \
            TMPDIR="$PWD/.quarto-tmp" \
            XDG_CACHE_HOME="$PWD/.cache" \
            DENO_DIR="$PWD/.cache/deno" \
            quarto render docs --no-execute-daemon

      render:
        help: Alias for docs.build
        hooks:
          pre-run:
            - task: docs.build

      preview:
        help: Preview the Quarto documentation website locally
        backend: bash
        hooks:
          pre-run:
            - task: docs.build
        run: |
          mkdir -p .quarto-tmp .cache/deno .cache/quarto-home
          HOME="$PWD/.cache/quarto-home" \
            TMPDIR="$PWD/.quarto-tmp" \
            XDG_CACHE_HOME="$PWD/.cache" \
            DENO_DIR="$PWD/.cache/deno" \
            quarto preview docs

  tests:
    tasks:
      linter:
        help: Run linter tools
        run: |
          pre-commit install
          pre-commit run --all-files --verbose

      unit:
        help: Run tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: ""
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        backend: bash
        run: |
          pytest ${{ args.path }} ${{ args.params }}

      ci:
        help: Run the same tests executed on CI
        hooks:
          pre-run:
            - task: tests.unit
            - task: tests.linter
            - task: docs.build

  package:
    tasks:
      build:
        help: Build the package with Poetry
        backend: bash
        run: poetry build

  release:
    vars:
      app: |
        env npm_config_ignore_scripts=true npx --yes \
        -p semantic-release \
        -p "@semantic-release/commit-analyzer" \
        -p "@semantic-release/release-notes-generator" \
        -p "@semantic-release/changelog" \
        -p "@semantic-release/exec" \
        -p "@semantic-release/github" \
        -p "@semantic-release/git" \
        -p "@google/semantic-release-replace-plugin" \
        semantic-release

    tasks:
      ci:
        help: Run semantic release on CI
        run: ${{ vars.app }} --ci

      dry:
        help: Run semantic release in dry-run mode
        run: ${{ vars.app }} --dry-run
